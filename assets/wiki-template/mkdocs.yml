site_name: __PROJECT__ Wiki
site_description: Local knowledge base for the project
# No site_url, no deployment: this wiki stays 100% local.

docs_dir: docs

# Server locked to the loopback interface (never exposed on the network).
dev_addr: '127.0.0.1:8000'

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.top
    - navigation.tracking
    - navigation.sections
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy

nav:
  - Home: README.md
  # add one line per file in docs/ here

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search:
      lang: en
